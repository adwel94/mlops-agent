# MANIFEST — 데이터셋·모델 버전 원장 (HF 버전의 단일 출처).
# 컨벤션: 태스크당 repo 하나 + git 태그로 버전. 큰 데이터는 HF 태그에, 로컬엔 최신
# 작업본만, 이 파일이 둘을 잇는 지도. 태그는 불변 — 데이터/설정이 바뀌면 새 버전
# 번호를 쓴다(같은 태그에 덮어쓰지 않음).
# 자동 append: hf_push_dataset.py(데이터셋) / launch_train.py(모델, eval=null 로 시작).
# 모델 eval 은 gr00t_eval 후 기록: python scripts/manifest.py set-eval <task> <model> <값>
# env_id: 태스크 키 → 시뮬 환경 ID (gr00t_play 가 모델 좌표만으로 환경을 구축하는 근거).
threecubes:
  env_id: ThreeColoredCubes-v1
  datasets:
    v1:
      episodes: 1000
      repo: adwel94/maniskill-threecubes-lerobot
      tag: v1
      date: '2026-06-19'
    v2:
      episodes: 1000
      repo: adwel94/maniskill-threecubes-lerobot
      tag: v2
      date: '2026-06-30'
      note: wrist-cam (panda_wristcam) — 2-camera [base_camera, hand_camera]; same
        1000 trajectories as v1, regenerated with the wrist hand_camera added (reaching-precision
        fix)
  models:
    v1-s3000:
      dataset: v1
      steps: 3000
      full: false
      repo: adwel94/gr00t-threecubes-ft
      tag: null
      eval: 0.2
      date: '2026-06-19'
    v1-s20000:
      dataset: v1
      steps: 20000
      full: false
      repo: adwel94/gr00t-threecubes
      tag: v1-s20000
      eval: 0.18
      date: '2026-06-26'
    v2-s3000:
      dataset: v2
      steps: 3000
      full: false
      repo: adwel94/gr00t-threecubes
      tag: v2-s3000
      eval: 0.92
      date: '2026-06-30'
      image: adwel94/maniskill-gr00t-train:git-97d2204
    v2-s20000:
      dataset: v2
      steps: 20000
      full: false
      repo: adwel94/gr00t-threecubes
      tag: v2-s20000
      eval: 0.96
      date: '2026-06-30'
      image: adwel94/maniskill-gr00t-train:git-97d2204
cubeinbowl:
  env_id: ColoredCubeInBowl-v1
  datasets:
    v1:
      episodes: 988
      repo: adwel94/maniskill-cubeinbowl-lerobot
      tag: v1
      date: '2026-07-02'
  models:
    v1-s1000:
      dataset: v1
      steps: 1000
      full: false
      repo: adwel94/gr00t-cubeinbowl
      tag: v1-s1000
      eval: null
      date: '2026-07-02'
      image: adwel94/maniskill-gr00t-train:latest
