      - hand_camera
      repo: adwel94/maniskill-cubeinbowl-lerobot
      tag: v1
      date: '2026-07-02'
  models:
    v1-s1000:
      dataset: v1
      steps: 1000
      full: false
      repo: adwel94/gr00t-cubeinbowl
      tag: v1-s1000
      eval: null
      date: '2026-07-02'
      image: adwel94/maniskill-gr00t-train:latest
    v0-s3000:
