# 모델 개발 계획 — 정하는 것만.   [model_plan.py create 로 생성]
# ─────────────────────────────────────────────────────────────
# /plan_run 이 이 사양대로 [태스크→데이터→학습→평가→판정] 루프를 목표까지 반복한다.
# 여기 없는 값(평가 조건·손절 규칙·승인 방식 등)은 하네스 기본값으로 자동 적용된다.
# 특정 기본값을 바꾸려면 그 줄만 손으로 추가하면 오버라이드된다.

mission:
  name: cubeinbowl-90
  task:
    kind: existing                  # existing | custom
    env_id: ColoredCubeInBowl-v1                   # kind=existing 일 때 (지원목록은 /task_to_h5)
    description: ""        # kind=custom 일 때 자연어 (예: "빨간 공을 그릇에")
  # 언어 명령은 환경(ColoredCubeInBowl-v1 의 instruction_template)이 선언 — 학습·평가가 거기서 읽음.

goal:
  target_success_rate: 0.9        # 이 점수 넘으면 완료

data:
  episodes: 988            # 학습 데이터 몇 개 (기존 v1 데이터셋 재사용 — 재생성 안 함)
  hf_dataset_repo: adwel94/maniskill-cubeinbowl-lerobot
  dataset_tag: v1               # 데이터셋 스냅샷 태그 (불변; 바뀌면 새 태그)

training:
  hf_output_repo: adwel94/gr00t-cubeinbowl     # 학습된 모델 올릴 HF repo

loop:
  step_ladder: [3000, 6000, 12000]                # 학습 스텝을 낮은 것부터 점진 (목표 도달까지 오름)
