# 모델 개발 계획 — 실행 사양 (YAML)   [model_plan.py create 로 생성됨]
# ─────────────────────────────────────────────────────────────
# /plan_run 이 이 사양대로 [태스크→데이터→학습→평가→판정] 루프를
# 목표 성공률 도달 또는 정지조건까지 반복한다.
# 각 항목 주석의 "선택지"에서 값을 바꿔 다양한 전략을 고를 수 있다.

# ── 1. 미션: 무슨 모델을 만드나 ──────────────────────────────
mission:
  name: model_plan.template
  task:
    kind: existing                  # 선택지: existing | custom
    env_id: ThreeColoredCubes-v1                   # kind=existing 일 때. 지원목록은 /task_to_h5 참고
    description: ""        # kind=custom 일 때 자연어 → /plan_run 이 먼저 /add_custom_task
  instruction: "pick the red cube"         # 평가·학습에 쓰는 언어 지시

# ── 2. 목표: 성공 기준 ───────────────────────────────────────
goal:
  target_success_rate: 0.9        # 이 점수 도달 = 임무 완료
  eval:                                # 평가 조건 (반복 내내 고정 → 비교 가능)
    episodes: 50               # 홀드아웃 평가셋 크기(=eval count). 선택지: 50 | 100
    seed: 0                       # 평가 샘플 RNG 고정 → 매 반복 동일 비교
    holdout_start_seed: 90000          # 학습셋(0..N)과 겹치지 않는 씬 seed 시작점 (train/test 분리, eval_method=v2)
    action_steps: 16                   # 하네스 기본값(호라이즌 최대=최적). 바꾸지 않음
    budget_factor: 3                   # 하네스 기본값(궤적길이×3). 바꾸지 않음

# ── 3. 데이터 & 초기 학습 ────────────────────────────────────
data:
  source: task_to_h5                # 선택지: task_to_h5(직접 생성) | fetch_sample_h5(공식 데모)
  episodes: 100            # 초기 데이터 규모
  hf_dataset_repo: adwel94/maniskill-threecubes-lerobot
  version: v2                   # 불변 버전 태그
training:
  hf_output_repo: adwel94/maniskill-threecubes-gr00t
  finetune_scope: head_only     # 선택지: head_only(기본) | full(tune_visual·눈녹이기·과금 큼)

# ── 4. 반복 루프: 스텝 사다리 + 정지 정책 (핵심) ─────────────
loop:
  lever: steps                         # 자동 루프가 돌리는 손잡이. 지금은 steps 하나
  step_ladder: [3000, 6000, 12000]                # 낮은 칸부터 오름 (오름차순 정수)
  continue_rule:                       # "이번 칸에서 충분히 올랐나?" → 다음 칸 진행 판정
    type: gap_fraction              # 선택지: gap_fraction | fixed_points
    gap_fraction: 0.333       # 남은거리(target−현재)의 이 비율 이상 올라야 계속
                                       #   선택지: 0.25(참을성) | 0.333(권장·60점→+10) | 0.5(빡센 손절)
    fixed_points: 5       # (type=fixed_points 일 때) 앞 칸보다 +이 절대점수 이상 (선택지: 5 | 10)
  confirm_on_ambiguous: true   # 기준에 아슬하면 다른 seed 로 한 번 더 확인
  stop:                                # 아래 중 하나라도 걸리면 루프 종료 + 알람
    on_target_reached: true            # 목표 도달 → "성공"
    on_plateau: true                   # continue_rule 미달 → "스텝으론 안 됨"
    on_ladder_exhausted: true          # 마지막 칸까지 미달 → "스텝 다 써봤는데 안 됨"
  # 스텝 사다리 소진 후에도 목표 미달이면 남은 카드(데이터↑·full·해상도)는
  # 비용·판단이 커서 자동 안 함 → 알람으로 사람에게 넘긴다.

# ── 5. 예산 & 승인 (과금 게이트) ─────────────────────────────
budget:
  approval_mode: per_pod       # 선택지: per_pod(매 파드 승인) | pre_approved(한도 내 자율)
  max_usd: 30                   # pre_approved 상한 (또는 전체 상한)
  max_train_runs: 3     # 최대 학습 횟수 (사다리 칸 수와 맞물림)
  max_concurrent_pods: 1
  auto_runpod_down: true               # 평가·서빙 끝나면 파드 자동 종료(과금 중단·자율)

# ── 6. 알림 ──────────────────────────────────────────────────
notify:
  channel: discord                     # 진행·종료 알람 채널
  on: [success, plateau, exhausted, error, awaiting_approval]
